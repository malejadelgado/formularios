<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <div class="contenedor-formulario">

        <h1>formulario de inscripcion</h1>
        <p class="subtitulo">clup robotica  llena tus datos</p>


        <form action="#" method="post">
            
            <div class="grupo-campo">

                <label for="nombre">nombre completo</label>
                <input type="text"id="nombre" name="nombre"  placeholder="escribe tu nombre" required>
            </div>

            <div class="grupo-campo">

                    <label for="correo">correo electronico</label>
                    <input type="email"id="correo" name="correo"  placeholder="ejemplo de correo" required>
            </div>

        
            <div class="grupo-campo">

                <label for="clave">crear una contraseña</label>
                <input type="password"id="clave" name="clave"  placeholder="minimo 6 caracteres" milegth=6 required>
                <p class="ayuda-texto"> debe tener almenos 6 caracteristicas</p>
            </div>


        
            <div class="grupo-campo">
          
            <label for="grado">en que grado estas</label>

            <select  id="grado" name="grado" required>
            

            <option value="seleclecciona"></option>
            <option value="6">6to grado</option>
            <option value="7">7mo grado</option>
            <option value="8">8 vo grado</option>
            <option value="9">9 no </option>
            
            </select>

            </div>

            <div class="grupo-campo">
                <label >tienes experiencia en la robotica</label>
                <div class="opcion-fila">
                    <div class="opcion-individual">
                        <input type="radio" id ="exp-si" name="experiencia" value="si">
                        <label for="exp-si">si</label>
                    </div>
                    <div class="opcion-individual">
                        <input type="radio" id="exp-no" name="experiencia" value="no">
                        <label for="exp-no">no</label>
                    </div>
                </div>
            </div>


            <div class="grupo-campo">

                <label>que quieres aprender (escoje 1 o varias opciones )</label>

                <div class="opciones-fila">
                    <div class="opcion-individual">
                        <input type="checkbox" id="prog" name="intereses" value="programacion">
                        <label for="prog">programacion</label>
                        
                    </div>

                    <div class="opcion individual">
                    <input type="checkbox"id=diseno name="intereses" value="electronica">
                    <label for="elec">electronica/label>

                    </div>
                    <div class="opcion individual">
                    <input type="checkbox"id= diseno name="intereses" value="diseno">
                    <label for="diseno">diseño 3d </label>


                    </div>

                </div>

            </div>
            <div class="grupo-campo">
            <label for="comentario">cuentanos algo sobre ti</label>
            <textarea id="comentario "name=comentario></textarea>

            </div>
            <button type="submit" class="button-enviar">enviar inscripcion</button>



            </div>

        </form>

    

</body>
</html>
